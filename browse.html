<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Browse | Attract / Shun</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <script src="version.js"></script>
  <script>AppAssets.loadStyle("styles.css");</script>
</head>
<body data-page="browse">
  <header class="site-header">
    <div class="brand-lockup">
      <p class="eyebrow">Intentional dating</p>
      <a class="brand" href="index.html" aria-label="ATTRACT Shun home">
        <img class="brand-logo" src="logo.svg" alt="ATTRACT Shun">
      </a>
    </div>
    <nav class="site-nav">
      <a href="login.html">Login</a>
      <a href="onboarding.html">Onboarding</a>
      <a href="dashboard.html">Dashboard</a>
      <a href="browse.html">Browse</a>
      <a href="match.html">Match</a>
      <a href="reports.html">Reports</a>
      <a href="success.html">Success</a>
      <a href="settings.html">Settings</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="page-shell">
    <section class="page-intro">
      <div>
        <p class="eyebrow">Browse</p>
        <h1>Discover matches inside your selected intent pool</h1>
      </div>
      <div class="info-chip" id="browse-user-chip"></div>
    </section>

    <section class="browse-grid">
      <article class="panel-card">
        <div class="panel-head">
          <h2>Discovery</h2>
          <span class="pill">Right swipe requires score</span>
        </div>
        <div class="browse-mode-switch">
          <button class="ghost-button" type="button" data-browse-mode="traditional">Browse Profiles</button>
          <button class="ghost-button" type="button" data-browse-mode="game">Matching Game</button>
        </div>
        <div id="traditional-panel" class="stack"></div>
        <div id="matching-game-panel" class="stack" hidden></div>
      </article>

      <article class="panel-card">
        <div class="panel-head">
          <h2>Incoming likes</h2>
          <span class="pill">Visible while engaged</span>
        </div>
        <div id="incoming-likes-panel" class="list-stack"></div>
      </article>
    </section>
  </main>

  <div id="profile-modal" class="profile-modal" hidden>
    <div class="profile-modal-shell">
      <button id="profile-modal-close" class="ghost-button modal-close" type="button">Close</button>
      <div id="profile-modal-card" class="panel-card profile-modal-card"></div>
    </div>
  </div>

  <script>
    AppAssets.loadScripts(["data.js", "auth.js"])
      .then(() => {
        AppAuth.protectPage();
        return AppAssets.loadScripts(["shared.js", "browse.js"]);
      });
  </script>
</body>
</html>
